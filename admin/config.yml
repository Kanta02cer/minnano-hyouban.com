# ================================================================
#  Decap CMS 設定ファイル
#  管理画面URL: https://minnano-hyouban.netlify.app/admin/
#
#  認証方式: Netlify Identity + Git Gateway
#  ログイン方法: Googleアカウント / メールアドレス
# ================================================================

backend:
  name: git-gateway
  branch: main

# ================================================================
#  エディトリアルワークフロー（下書き保存・公開ボタン）
#  下書き → レビュー中 → 公開 の3ステップ管理
# ================================================================
publish_mode: editorial_workflow

# 画像アップロード先
media_folder: images/photos
public_folder: /images/photos

# 日本語UI
locale: ja

# ================================================================
#  コレクション定義
# ================================================================
collections:

  # ── 記事（_drafts/*.md）────────────────────────────────────
  - name: articles
    label: 記事
    label_singular: 記事
    folder: _drafts
    create: true
    delete: true
    slug: "{{fields.company}}"
    extension: md
    format: frontmatter
    summary: "{{company}} — {{category}} — {{publishedAt}}"
    sortable_fields: ["publishedAt", "company"]
    fields:

      # ── 基本情報 ──────────────────────────────────────────
      - label: "企業・サービス名"
        name: company
        widget: string
        hint: "例: SenoRich（Nジェネレーション株式会社）"

      - label: "カテゴリ"
        name: category
        widget: select
        options:
          - "キャリア・転職"
          - "美容・健康"
          - "語学・スキル"
          - "マネー・投資"
          - "ライフスタイル"

      - label: "公開日"
        name: publishedAt
        widget: date
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"

      - label: "公式サイトURL"
        name: officialUrl
        widget: string
        default: "#"
        hint: "未確定の場合は # のままで可"

      # ── 記事本文（自然言語）──────────────────────────────
      - label: "記事本文"
        name: body
        widget: markdown
        hint: |
          自然言語でそのまま書いてください。
          AIが自動的に構造化（reviews / interviews / FAQ / cuttingQA など）します。
          入稿シートの各セクション（##1〜##14）に沿って記述すると精度が上がります。
        modes:
          - rich_text
          - raw
