<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ログイン | みんなの評判.com 管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #0d1b3e;
      margin-bottom: 6px;
    }
    .logo span { color: #b8974a; }
    .card-subtitle {
      text-align: center;
      font-size: 13px;
      color: #8a8a8a;
      margin-bottom: 32px;
    }

    /* タブ切り替え */
    .tabs {
      display: flex;
      border-bottom: 2px solid #eee;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: #aaa;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: #0d1b3e;
      border-bottom-color: #b8974a;
    }

    /* パネル表示切り替え */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Googleボタン */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      background: #fff;
      font-size: 15px;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      margin-bottom: 18px;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ccc;
      font-size: 12px;
      margin-bottom: 18px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #eee;
    }

    /* フォーム */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 5px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #b8974a; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #0d1b3e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #1a2f5a; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }

    /* ログイン済みビュー */
    #view-loggedin { display: none; text-align: center; }
    .user-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #eaeff8;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #0d1b3e;
      margin: 0 auto 14px;
    }
    .user-name { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .user-email { font-size: 13px; color: #8a8a8a; margin-bottom: 28px; }
    .btn-cms {
      display: block; width: 100%; padding: 13px;
      background: #b8974a; color: #fff; text-decoration: none;
      border-radius: 8px; font-size: 15px; font-weight: 700;
      margin-bottom: 12px; transition: background 0.15s;
    }
    .btn-cms:hover { background: #a07d3a; }
    .btn-logout {
      width: 100%; padding: 11px;
      background: transparent; border: 1.5px solid #e0e0e0;
      border-radius: 8px; color: #888; font-size: 14px;
      font-family: inherit; cursor: pointer; transition: background 0.15s;
    }
    .btn-logout:hover { background: #f5f5f5; color: #333; }

    /* アカウントなし案内パネル */
    .no-account-box {
      background: #f8f6f0;
      border: 1.5px solid #e8dfc8;
      border-radius: 10px;
      padding: 24px 20px;
      text-align: center;
    }
    .no-account-box .icon { font-size: 32px; margin-bottom: 12px; }
    .no-account-box h3 { font-size: 15px; font-weight: 700; color: #0d1b3e; margin-bottom: 8px; }
    .no-account-box p { font-size: 13px; color: #666; line-height: 1.7; }
    .no-account-box .contact-info {
      margin-top: 16px;
      padding: 12px;
      background: #fff;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
    }
    .no-account-box .contact-info a { color: #b8974a; text-decoration: none; font-weight: 500; }

    /* メッセージ */
    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .msg.error { background: #fff0f0; color: #c0392b; display: block; }
    .msg.success { background: #f0fff4; color: #27ae60; display: block; }
    .msg.info { background: #f0f4ff; color: #2563eb; display: block; }

    .loader {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">みんなの評判<span>.com</span></div>
  <div class="card-subtitle">管理画面</div>

  <!-- ログイン済みビュー -->
  <div id="view-loggedin">
    <div class="user-avatar" id="user-avatar">U</div>
    <div class="user-name" id="user-name"></div>
    <div class="user-email" id="user-email"></div>
    <a href="https://minnano-hyouban.netlify.app/admin/" class="btn-cms">編集画面を開く →</a>
    <button class="btn-logout" id="btn-logout">ログアウト</button>
  </div>

  <!-- 未ログインビュー -->
  <div id="view-auth">
    <!-- タブ -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">ログイン</button>
      <button class="tab-btn" data-tab="no-account">アカウントをお持ちでない方</button>
    </div>

    <!-- ログインパネル -->
    <div class="panel active" id="panel-login">
      <button class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/>
        </svg>
        Googleでログイン
      </button>

      <div class="divider">またはメールアドレスで</div>

      <form id="form-login" novalidate>
        <div class="form-group">
          <label for="login-email">メールアドレス</label>
          <input type="email" id="login-email" placeholder="example@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="login-password">パスワード</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary" id="btn-login-submit">ログイン</button>
      </form>

      <div class="msg" id="login-msg"></div>
    </div>

    <!-- アカウントなしパネル -->
    <div class="panel" id="panel-no-account">
      <div class="no-account-box">
        <div class="icon">🔒</div>
        <h3>この管理画面は招待制です</h3>
        <p>アカウントの新規登録はできません。<br>管理者から招待メールをお受け取りの上、<br>ログインページよりアクセスしてください。</p>
        <div class="contact-info">
          招待が必要な方は管理者へご連絡ください<br>
          <a href="mailto:kinoue.certify@gmail.com">kinoue.certify@gmail.com</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  const ADMIN_URL = 'https://minnano-hyouban.netlify.app/admin/';
  const API_URL   = 'https://minnano-hyouban.netlify.app/.netlify/identity';

  // Netlify Identity 初期化
  if (window.netlifyIdentity) {
    window.netlifyIdentity.init({ APIUrl: API_URL });
  }

  /* ─── タブ切り替え ─── */
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  /* ─── ログイン済み表示 ─── */
  function showLoggedIn(user) {
    document.getElementById('view-auth').style.display = 'none';
    document.getElementById('view-loggedin').style.display = 'block';
    var name = (user.user_metadata && user.user_metadata.full_name)
      ? user.user_metadata.full_name
      : user.email.split('@')[0];
    document.getElementById('user-name').textContent  = name;
    document.getElementById('user-email').textContent = user.email;
    document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
  }

  function showLoggedOut() {
    document.getElementById('view-auth').style.display = 'block';
    document.getElementById('view-loggedin').style.display = 'none';
  }

  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  /* ─── Identity イベント ─── */
  window.netlifyIdentity.on('init', function(user) {
    if (user) { showLoggedIn(user); } else { showLoggedOut(); }
  });

  window.netlifyIdentity.on('login', function(user) {
    window.netlifyIdentity.close();
    showLoggedIn(user);
    // 編集画面へリダイレクト
    setTimeout(function() {
      window.location.replace(ADMIN_URL);
    }, 500);
  });

  window.netlifyIdentity.on('logout', function() {
    showLoggedOut();
  });

  window.netlifyIdentity.on('error', function(err) {
    var msg = 'ログインに失敗しました。';
    if (err && err.message) {
      if (err.message.toLowerCase().includes('invalid') || err.message.toLowerCase().includes('password')) {
        msg = 'メールアドレスまたはパスワードが違います。';
      } else if (err.message.toLowerCase().includes('not found') || err.message.toLowerCase().includes('exist')) {
        msg = 'アカウントが見つかりません。「アカウントをお持ちでない方」タブをご確認ください。';
      }
    }
    showMsg('login-msg', msg, 'error');
    var btn = document.getElementById('btn-login-submit');
    btn.disabled = false;
    btn.textContent = 'ログイン';
  });

  /* ─── Googleログイン ─── */
  document.getElementById('btn-google').addEventListener('click', function() {
    window.netlifyIdentity.open('login');
  });

  /* ─── メールログインフォーム ─── */
  document.getElementById('form-login').addEventListener('submit', function(e) {
    e.preventDefault();
    var email    = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    var btn      = document.getElementById('btn-login-submit');

    if (!email || !password) {
      showMsg('login-msg', 'メールアドレスとパスワードを入力してください。', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>ログイン中...';
    document.getElementById('login-msg').className = 'msg';

    // Netlify Identity REST APIで直接ログイン
    fetch(API_URL + '/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'grant_type=password&username=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(password)
    })
    .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
    .then(function(result) {
      if (result.ok && result.data.access_token) {
        showMsg('login-msg', 'ログインしました。編集画面に移動します...', 'success');
        setTimeout(function() {
          window.location.replace(ADMIN_URL);
        }, 600);
      } else {
        var errMsg = 'メールアドレスまたはパスワードが違います。';
        if (result.data && result.data.error_description) {
          if (result.data.error_description.toLowerCase().includes('not found')) {
            errMsg = 'アカウントが見つかりません。「アカウントをお持ちでない方」タブをご確認ください。';
          }
        }
        showMsg('login-msg', errMsg, 'error');
        btn.disabled = false;
        btn.textContent = 'ログイン';
      }
    })
    .catch(function() {
      showMsg('login-msg', '通信エラーが発生しました。しばらく待ってから再試行してください。', 'error');
      btn.disabled = false;
      btn.textContent = 'ログイン';
    });
  });

  /* ─── ログアウト ─── */
  document.getElementById('btn-logout').addEventListener('click', function() {
    window.netlifyIdentity.logout();
  });
</script>

</body>
</html>
